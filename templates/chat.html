<!DOCTYPE html>
<html>
<head>
    <title>Medical Chatbot</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.5.0/css/all.css">
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='style.css')}}"/>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
</head>
<body>
    <div class="container-fluid">
        <div class="chat-container">
            <div class="chat-header">
                <div class="bot-avatar">
                    <img src="https://cdn-icons-png.flaticon.com/512/387/387569.png" alt="Bot">
                </div>
                <div class="bot-info">
                    <h3>Medical Assistant</h3>
                    <p>
                        <span class="status-dot"></span>
                        Online - Ready to help
                    </p>
                </div>
            </div>

            <div class="chat-body" id="messageFormeight">
                <div class="welcome-message">
                    <i class="fas fa-comments"></i>
                    <h4>Welcome to Medical Assistant</h4>
                    <p>Ask me anything about your health concerns</p>
                </div>
            </div>

            <div class="chat-footer">
                <div class="document-tools">
                    <input type="file" id="pdfUpload" accept="application/pdf" class="file-input">
                    <button type="button" id="uploadButton" class="tool-button">
                        <i class="fas fa-file-upload"></i>
                        <span>Upload PDF</span>
                    </button>
                    <button type="button" id="resetButton" class="tool-button secondary">
                        <i class="fas fa-undo"></i>
                        <span>Reset</span>
                    </button>
                </div>
                <form id="messageArea" class="input-container">
                    <textarea 
                        id="text" 
                        name="msg" 
                        placeholder="Type your message..." 
                        autocomplete="off" 
                        class="message-input"
                        rows="1"
                        required
                    ></textarea>
                    <button type="submit" class="send-button">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script>
        $(document).ready(function() {
            // Auto-resize textarea
            $('#text').on('input', function() {
                this.style.height = 'auto';
                this.style.height = Math.min(this.scrollHeight, 120) + 'px';
            });

            // Remove welcome message on first interaction
            let firstMessage = true;

            function appendMessage(type, text, time) {
                const message = $('<div>').addClass('message').addClass(type);
                const content = $('<div>').addClass('message-content');
                const bubble = $('<div>').addClass('message-bubble').text(text);
                const timestamp = $('<div>').addClass('message-time').text(time);
                const avatar = $('<div>').addClass('message-avatar');
                const image = $('<img>').attr({
                    src: type === 'user'
                        ? 'https://i.ibb.co/d5b84Xw/Untitled-design.png'
                        : 'https://cdn-icons-png.flaticon.com/512/387/387569.png',
                    alt: type === 'user' ? 'User' : 'Bot'
                });

                avatar.append(image);
                content.append(bubble, timestamp);

                if (type === 'user') {
                    message.append(content, avatar);
                } else {
                    message.append(avatar, content);
                }

                $("#messageFormeight").append(message);
                $("#messageFormeight").scrollTop($("#messageFormeight")[0].scrollHeight);
            }

            function currentTime() {
                const date = new Date();
                const hour = date.getHours().toString().padStart(2, '0');
                const minute = date.getMinutes().toString().padStart(2, '0');
                return hour + ":" + minute;
            }

            $("#uploadButton").on("click", function() {
                const file = $("#pdfUpload")[0].files[0];
                if (!file) {
                    appendMessage('bot', 'Please choose a PDF first.', currentTime());
                    return;
                }

                const formData = new FormData();
                formData.append('file', file);
                $("#uploadButton").prop('disabled', true);

                $.ajax({
                    url: "/upload",
                    type: "POST",
                    data: formData,
                    processData: false,
                    contentType: false,
                }).done(function(data) {
                    appendMessage('bot', data.message, currentTime());
                }).fail(function(xhr) {
                    const message = xhr.responseJSON && xhr.responseJSON.error
                        ? xhr.responseJSON.error
                        : 'Upload failed. Please try another PDF.';
                    appendMessage('bot', message, currentTime());
                }).always(function() {
                    $("#uploadButton").prop('disabled', false);
                    $("#pdfUpload").val('');
                });
            });

            $("#resetButton").on("click", function() {
                $.post("/reset_context").done(function(data) {
                    appendMessage('bot', data.message, currentTime());
                });
            });

            $("#messageArea").on("submit", function(event) {
                event.preventDefault();
                
                if (firstMessage) {
                    $('.welcome-message').remove();
                    firstMessage = false;
                }

                const str_time = currentTime();
                const rawText = $("#text").val().trim();

                if (!rawText) return;
                
                $("#text").val("");
                $("#text").css('height', 'auto');
                appendMessage('user', rawText, str_time);

                $.ajax({
                    data: { msg: rawText },
                    type: "POST",
                    url: "/get",
                }).done(function(data) {
                    appendMessage('bot', data, currentTime());
                }).fail(function(xhr) {
                    appendMessage('bot', xhr.responseText || 'Something went wrong.', currentTime());
                });
            });
        });
    </script>
</body>
</html>
