<!DOCTYPE html>
<html>
<head>
    <title>Medical Chatbot</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.5.0/css/all.css">
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='style.css')}}"/>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
</head>
<body>
    <div class="container-fluid">
        <div class="chat-container">
            <div class="chat-header">
                <div class="bot-avatar">
                    <img src="https://cdn-icons-png.flaticon.com/512/387/387569.png" alt="Bot">
                </div>
                <div class="bot-info">
                    <h3>Medical Assistant</h3>
                    <p>
                        <span class="status-dot"></span>
                        Online • Ready to help
                    </p>
                </div>
            </div>

            <div class="chat-body" id="messageFormeight">
                <div class="welcome-message">
                    <i class="fas fa-comments"></i>
                    <h4>Welcome to Medical Assistant</h4>
                    <p>Ask me anything about your health concerns</p>
                </div>
            </div>

            <div class="chat-footer">
                <form id="messageArea" class="input-container">
                    <textarea 
                        id="text" 
                        name="msg" 
                        placeholder="Type your message..." 
                        autocomplete="off" 
                        class="message-input"
                        rows="1"
                        required
                    ></textarea>
                    <button type="submit" class="send-button">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script>
        $(document).ready(function() {
            // Auto-resize textarea
            $('#text').on('input', function() {
                this.style.height = 'auto';
                this.style.height = Math.min(this.scrollHeight, 120) + 'px';
            });

            // Remove welcome message on first interaction
            let firstMessage = true;

            $("#messageArea").on("submit", function(event) {
                event.preventDefault();
                
                if (firstMessage) {
                    $('.welcome-message').remove();
                    firstMessage = false;
                }

                const date = new Date();
                const hour = date.getHours().toString().padStart(2, '0');
                const minute = date.getMinutes().toString().padStart(2, '0');
                const str_time = hour + ":" + minute;
                const rawText = $("#text").val().trim();

                if (!rawText) return;

                const userHtml = `
                    <div class="message user">
                        <div class="message-content">
                            <div class="message-bubble">${rawText}</div>
                            <div class="message-time">${str_time}</div>
                        </div>
                        <div class="message-avatar">
                            <img src="https://i.ibb.co/d5b84Xw/Untitled-design.png" alt="User">
                        </div>
                    </div>
                `;
                
                $("#text").val("");
                $("#text").css('height', 'auto');
                $("#messageFormeight").append(userHtml);
                $("#messageFormeight").scrollTop($("#messageFormeight")[0].scrollHeight);

                $.ajax({
                    data: { msg: rawText },
                    type: "POST",
                    url: "/get",
                }).done(function(data) {
                    const botHtml = `
                        <div class="message bot">
                            <div class="message-avatar">
                                <img src="https://cdn-icons-png.flaticon.com/512/387/387569.png" alt="Bot">
                            </div>
                            <div class="message-content">
                                <div class="message-bubble">${data}</div>
                                <div class="message-time">${str_time}</div>
                            </div>
                        </div>
                    `;
                    $("#messageFormeight").append(botHtml);
                    $("#messageFormeight").scrollTop($("#messageFormeight")[0].scrollHeight);
                });
            });
        });
    </script>
</body>
</html>
